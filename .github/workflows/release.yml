name: Release

on:
    release:
        types: [published]
    workflow_dispatch:
        inputs:
            tag:
                description: "Existing release tag to attest and re-upload (e.g., 1.0.0)"
                required: true

permissions:
    contents: write
    id-token: write
    attestations: write

jobs:
    build-and-attest:
        runs-on: ubuntu-latest
        steps:
            - name: Resolve tag
              id: tag
              run: |
                  if [ "${{ github.event_name }}" = "release" ]; then
                      echo "tag=${{ github.event.release.tag_name }}" >> "$GITHUB_OUTPUT"
                  else
                      echo "tag=${{ inputs.tag }}" >> "$GITHUB_OUTPUT"
                  fi

            - name: Checkout source at tag
              uses: actions/checkout@v4
              with:
                  ref: ${{ steps.tag.outputs.tag }}

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: "22.x"
                  cache: "npm"

            - name: Install dependencies
              run: npm ci

            - name: Build plugin
              run: npm run build

            - name: Generate build provenance attestation
              uses: actions/attest-build-provenance@v2
              with:
                  subject-path: |
                      main.js
                      manifest.json

            - name: Upload assets to release
              env:
                  GH_TOKEN: ${{ github.token }}
                  TAG: ${{ steps.tag.outputs.tag }}
              run: gh release upload "$TAG" main.js manifest.json --clobber
